name: edumate
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  local_auth: ^2.3.0

  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.3
  file_picker: ^8.0.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.9.1





dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4



flutter:

  uses-material-design: true

  assets:
    - assets/images/


flutter_launcher_icons:
